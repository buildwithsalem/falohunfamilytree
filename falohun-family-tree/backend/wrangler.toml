name = "falohun-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
FRONTEND_URL = "https://falohun.pages.dev"
R2_PUBLIC_URL = "https://pub-YOUR-BUCKET-ID.r2.dev"

[[d1_databases]]
binding = "DB"
database_name = "falohun-family-db"
database_id = "aafccf05-95b9-45d0-8e77-e8a11f3e2ad0"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "falohun-family-media"

[secrets]
# Set via: wrangler secret put JWT_SECRET
